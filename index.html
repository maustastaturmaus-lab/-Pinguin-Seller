<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐧 Pinguin-Seller Baukasten</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 80px 20px 20px 20px;
        }

        /* Admin Button oben rechts */
        .admin-corner {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .admin-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Das Admin-Panel an der Seite */
        .admin-panel {
            display: none;
            position: fixed;
            top: 80px;
            right: 20px;
            width: 320px;
            background: #222;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }
        .admin-panel h2 { color: #f1c40f; margin-top: 0; font-size: 20px; }
        .admin-panel label { display: block; margin-top: 10px; font-size: 13px; color: #ccc; }
        .admin-panel input, .admin-panel textarea, .admin-panel button {
            width: 100%;
            padding: 8px;
            margin: 5px 0 10px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }
        .admin-panel button {
            background-color: #27ae60;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-panel button.delete-mode-btn {
            background-color: #e74c3c;
        }

        /* Der eigentliche Shop-Inhalt (Die Arbeitsfläche) */
        .shop-canvas {
            max-width: 1000px;
            margin: 0 auto;
            min-height: 500px;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
        }

        /* Elemente, die verschoben werden können */
        .draggable-element {
            position: relative;
            padding: 10px;
            margin: 10px 0;
            border: 1px transparent dashed;
            transition: border 0.2s;
        }

        /* Wenn das Admin-Panel offen ist, zeigen wir an, was verschiebbar ist */
        body.admin-mode .draggable-element {
            border: 1px #3498db dashed;
            cursor: move;
        }
        body.admin-mode .draggable-element:hover {
            background-color: rgba(52, 152, 219, 0.05);
        }

        /* Lösch-Button für Elemente im Admin-Modus */
        .delete-overlay {
            display: none;
            position: absolute;
            top: 2px;
</html>
