<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐧 Pinguin-Seller | Official Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg-body: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --admin-dark: #1e293b;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 20px rgba(15, 23, 42, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 999;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
        .brand { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        
        .cart-btn {
            background: var(--text-main); color: white; border: none; padding: 10px 18px;
            border-radius: var(--radius-md); font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: all 0.2s ease;
        }
        .cart-btn:hover { transform: translateY(-1px); background: #000; }

        /* HERO SECTION */
        .hero { text-align: center; padding: 60px 20px 20px 20px; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-family: 'Poppins', sans-serif; font-size: 42px; margin: 0 0 15px 0; font-weight: 700; }
        .hero p { color: var(--text-muted); font-size: 18px; margin: 0; }

        /* SHOP GRID */
        .shop-container { max-width: 1200px; margin: 40px auto; padding: 0 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); border: 1px solid #f1f5f9; text-align: center; transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 220px; object-fit: cover; border-radius: var(--radius-md); }
        .product-card h3 { font-family: 'Poppins', sans-serif; margin: 15px 0 8px 0; font-size: 20px; }
        .product-card .price-tag { color: var(--primary); font-weight: 700; font-size: 20px; margin-bottom: 15px; }
        
        .btn-action { width: 100%; padding: 12px; border-radius: var(--radius-md); border: none; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s ease; }
        .btn-buy { background: var(--primary); color: white; }
        .btn-buy:hover { background: var(--primary-hover); }

        /* KONTAKT FORMULAR */
        .contact-section { max-width: 500px; margin: 80px auto; padding: 40px; background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid #f1f5f9; }
        .contact-section h2 { font-family: 'Poppins', sans-serif; margin-top: 0; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius-md); box-sizing: border-box; font-family: inherit; }
        
        /* DRAWERS (SIDE PANELS) */
        .drawer { position: fixed; top: 0; width: 400px; height: 100vh; background: white; box-shadow: 0 0 40px rgba(0,0,0,0.1); z-index: 10000; transition: all 0.3s ease; padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; }
