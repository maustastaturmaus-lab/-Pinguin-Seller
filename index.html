<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐧 Pinguin-Seller | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #3498db;
            --bg-light: #f8fafc;
            --bg-dark: #0f172a;
            --text-light: #1e293b;
            --text-dark: #f1f5f9;
            --admin-bg: #1e293b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-light);
            transition: var(--transition);
            overflow-x: hidden;
        }

        body.dark-theme {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        .header-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        .dark-theme .header-nav { background: rgba(15, 23, 42, 0.8); color: white; }

        .logo { font-family: 'Poppins', sans-serif; font-size: 24px; display: flex; align-items: center; gap: 10px; }

        .page-links { display: flex; gap: 20px; }
        .nav-item { 
            cursor: pointer; padding: 8px 16px; border-radius: 8px; font-weight: 500; 
            transition: var(--transition); border: none; background: transparent; color: inherit;
        }
        .nav-item.active { background: var(--primary); color: white; }

        .admin-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--admin-bg);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: var(--transition);
        }
        .admin-trigger:hover { transform: scale(1.1) rotate(45deg); }

        .admin-drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 400px;
            height: 100vh;
            background: #fff;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: right 0.4s ease;
            display: flex;
            flex-direction: column;
            color: #1e293b;
        }
        .admin-drawer.open { right: 0; }
        .drawer-header { padding: 30px; background: var(--admin-bg); color: white; }
        .drawer-tabs { display: flex; background: #f1f5f9; }
        .tab-btn { 
            flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: 600; 
            background: transparent; color: #64748b; border-bottom: 3px solid transparent;
        }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: #fff; }

        .tab-content { padding: 25px; flex-grow: 1; overflow-y: auto; display: none; }
        .tab-content.active { display: block; }

        .field-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475569; }
